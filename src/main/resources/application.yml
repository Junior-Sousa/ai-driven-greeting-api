spring:
  application:
    name: ai-driven-greeting-api
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  shutdown: graceful

greeting:
  default-name: Guest
  environment: local

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  show-actuator: false
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs
